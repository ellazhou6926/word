<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordMaster</title>
    <style>
        :root { --primary: #4a90e2; --success: #34c759; --danger: #ff3b30; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; color: #333; margin: 0; box-sizing: border-box; }
        .hidden { display: none !important; }
        #login-interface, #study-interface, #quiz-interface, #result-interface { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        /* 單字卡 */
        .card { width: 100%; min-height: 380px; background: var(--card-bg); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; position: relative; box-sizing: border-box; cursor: pointer; }
        .card-more-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; color: #ccc; padding: 5px; cursor: pointer; z-index: 10; }
        
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 12px; font-size: 1.1rem; font-family: inherit; }
        .primary-btn { padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-circle { width: 60px; height: 60px; border-radius: 50%; border: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        
        .nav-control-btn { height: 46px; padding: 0 12px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        
        /* 彈窗樣式 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; text-align: left; }
        
        /* 回饋浮窗專用 */
        #feedback-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .feedback-box { background: white; padding: 30px; border-radius: 24px; width: 80%; max-width: 300px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        /* 編輯區域 */
        .pos-entry { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--primary); position: relative; }
        .remove-pos-btn { position: absolute; top: 5px; right: 5px; color: var(--danger); background: none; border: none; cursor: pointer; font-weight: bold; }
        
        .pos-group-display { text-align: left; width: 100%; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .ex-container { background: #f3f4f6; padding: 12px; border-radius: 10px; margin-top: 5px; font-size: 1.1rem; cursor: pointer; }
        .manage-item { display: flex; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 12px; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div id="login-interface">
        <h2 style="color: var(--primary);">WordMaster</h2>
        <input type="text" id="user-name-input" placeholder="輸入名字開始">
        <button class="primary-btn" onclick="window.login()">登入</button>
    </div>

    <div id="study-interface" class="hidden">
        <div style="display:flex; width:100%; justify-content: space-between; margin-bottom: 10px;">
            <span id="user-display" style="font-weight: bold; color: var(--primary);"></span>
            <button onclick="location.reload()" style="background:none; border:none; color:#999; text-decoration:underline;">登出</button>
        </div>
        <div style="display:flex; gap:6px; width:100%; margin-bottom:15px;">
            <select id="unit-nav-selector" onchange="window.setUnitMode(this.value)" style="flex-grow:1; height:46px;"></select>
            <button class="nav-control-btn" onclick="window.openManageModal()">☰</button>
            <button class="nav-control-btn" style="background:var(--success); color:white; border:none;" onclick="window.openAddModal()">+</button>
        </div>
        <div class="card" onclick="window.flipCard()">
            <div class="card-more-btn" onclick="window.openEditFromCard(event)">⋯</div>
            <h1 id="word-display" style="font-size: 3.2rem;">載入中...</h1>
            <div id="detail-display" style="display: none; width: 100%;">
                <div id="pos-groups-area"></div>
                <div id="note-display" style="font-size: 1rem; color:#777; border-top:1px dashed #ccc; padding-top:10px; margin-top:10px; font-style:italic;"></div>
            </div>
        </div>
        <div style="display: flex; gap: 20px; margin-top: 20px;">
            <button class="btn-circle" onclick="window.changeWord(-1)">←</button>
            <button id="star-btn" class="btn-circle" onclick="window.toggleStar()">☆</button>
            <button class="btn-circle" onclick="window.changeWord(1)">→</button>
        </div>
        <button class="primary-btn" style="margin-top:20px;" onclick="window.openQuizMenu()">開始測驗</button>
    </div>

    <div id="feedback-overlay">
        <div class="feedback-box">
            <div id="feedback-icon" style="font-size: 3rem; margin-bottom: 15px;"></div>
            <div id="feedback-text" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; line-height: 1.4;"></div>
            <button id="feedback-btn" class="primary-btn" onclick="window.handleFeedbackClose()">繼續</button>
        </div>
    </div>

    <div id="quizMenuModal" class="modal">
        <div class="modal-content" style="text-align:center;">
            <h3 style="margin-top:0">選擇測驗模式</h3>
            <button class="primary-btn" onclick="window.startQuiz('choice')">選擇題模式</button>
            <button class="primary-btn" style="background:#9b59b6; margin-top:15px;" onclick="window.startQuiz('spelling')">拼字測驗 (聽音拼寫)</button>
            <button class="primary-btn" style="background:#888; margin-top:15px;" onclick="document.getElementById('quizMenuModal').style.display='none'">取消</button>
        </div>
    </div>

    <div id="quiz-interface" class="hidden">
        <div id="quiz-progress" style="margin-bottom: 15px; font-weight: bold; color: var(--primary);"></div>
        <div class="card" style="cursor: default;">
            <div id="quiz-question-text" style="font-size: 1.8rem; font-weight: bold; margin-bottom: 20px;"></div>
            <div id="quiz-options-area" style="width:100%"></div>
            <div id="quiz-spelling-area" class="hidden" style="width:100%">
                <button class="primary-btn" style="background:#f39c12; width:auto; margin-bottom:15px;" onclick="window.speakQuizWord()">🔊 重聽聲音</button>
                <input type="text" id="spelling-input" placeholder="輸入單字並按 Enter" style="text-align:center;">
                <button class="primary-btn" onclick="window.submitSpelling()">送出答案</button>
            </div>
        </div>
        <button class="primary-btn" style="background:#888; margin-top:20px;" onclick="window.exitQuiz()">結束測驗</button>
    </div>

    <div id="result-interface" class="hidden">
        <h2>測驗結束</h2><p id="score-text" style="font-size: 1.5rem; font-weight:bold;"></p>
        <div id="wrong-words-list" style="width:100%;"></div>
        <button class="primary-btn" onclick="window.exitQuiz()">返回學習模式</button>
    </div>

    <div id="wordEditModal" class="modal"><div class="modal-content"><h3 id="modal-title" style="margin-top:0">編輯單字</h3><input type="text" id="edit-word-unit" placeholder="單元"><input type="text" id="edit-word-eng" placeholder="英文"><div id="pos-container"></div><button class="primary-btn" style="background:#eee; color:#333; margin-bottom:15px;" onclick="window.addPosField()">+ 增加翻譯</button><textarea id="edit-word-note" placeholder="備註"></textarea><button class="primary-btn" style="background:var(--success)" onclick="window.saveWordChange()">儲存</button><button class="primary-btn" style="background:#888; margin-top:10px;" onclick="window.closeEditModal()">取消</button></div></div>
    <div id="manageModal" class="modal"><div class="modal-content"><h3 style="margin-top:0">管理單字</h3><div id="manage-list-container"></div><button class="primary-btn" style="background:#888; margin-top:15px;" onclick="window.closeManageModal()">關閉</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCa-uQsB27p4adt7_c074zitJTJUm9R57c", authDomain: "word-32e5c.firebaseapp.com", databaseURL: "https://word-32e5c-default-rtdb.firebaseio.com", projectId: "word-32e5c", storageBucket: "word-32e5c.firebasestorage.app", messagingSenderId: "1065772631955", appId: "1:1065772631955:web:5c8e44b1d95560e3224a66" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.currentUser = ""; window.vocabulary = []; window.currentUnit = "all"; window.currentIndex = 0; window.isFlipped = false;
        let quizQueue = []; let quizIdx = 0; let wrongWords = []; let currentQuizMode = ""; let editingId = null;
        let feedbackCorrect = true;

        window.login = function() {
            const name = document.getElementById('user-name-input').value.trim();
            if (!name) return alert("請輸入名字");
            window.currentUser = name;
            document.getElementById('login-interface').classList.add('hidden');
            document.getElementById('study-interface').classList.remove('hidden');
            onValue(ref(db, 'users/' + window.currentUser), (snap) => {
                const data = snap.val();
                if (data) {
                    window.vocabulary = (data.vocabulary || []).map(v => {
                        if (!v.posGroups) v.posGroups = [{ pos: v.pos || 'n.', trans: v.trans || '無', ex: '', exTrans: '' }];
                        if (v.visible === undefined) v.visible = true;
                        return v;
                    });
                }
                updateUnitSelector(); window.updateUI();
            });
        };

        // --- 發音與 UI 更新 ---
        window.speakText = function(text) {
            const ut = new SpeechSynthesisUtterance(text);
            ut.lang = 'en-US';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(ut);
        };

        window.updateUI = function() {
            const list = getVisibleList();
            const wd = document.getElementById('word-display');
            const dd = document.getElementById('detail-display');
            const area = document.getElementById('pos-groups-area');
            if (list.length === 0) { wd.innerText = "無單字"; return; }
            const item = list[window.currentIndex % list.length];
            wd.innerText = item.word;
            area.innerHTML = "";
            item.posGroups.forEach(g => {
                area.innerHTML += `<div class="pos-group-display"><b>(${g.pos})</b> ${g.trans}${g.ex ? `<div class="ex-container" onclick="window.speakText('${g.ex.replace(/'/g, "\\'")}')">${g.ex}</div>` : ''}</div>`;
            });
            document.getElementById('note-display').innerText = item.note || "";
            wd.style.display = window.isFlipped ? 'none' : 'block';
            dd.style.display = window.isFlipped ? 'block' : 'none';
        };

        // --- 測驗系統 ---
        window.openQuizMenu = function() {
            if (getVisibleList().length < 2) return alert("單字量不足");
            document.getElementById('quizMenuModal').style.display = 'flex';
        };

        window.startQuiz = function(mode) {
            currentQuizMode = mode;
            quizQueue = [...getVisibleList()].sort(() => Math.random() - 0.5);
            quizIdx = 0; wrongWords = [];
            document.getElementById('quizMenuModal').style.display = 'none';
            document.getElementById('study-interface').classList.add('hidden');
            document.getElementById('quiz-interface').classList.remove('hidden');
            loadQuizQuestion();
        };

        function loadQuizQuestion() {
            const item = quizQueue[quizIdx];
            document.getElementById('quiz-progress').innerText = `題目：${quizIdx + 1} / ${quizQueue.length}`;
            const qText = document.getElementById('quiz-question-text');
            const optArea = document.getElementById('quiz-options-area');
            const spellArea = document.getElementById('quiz-spelling-area');

            if (currentQuizMode === 'choice') {
                spellArea.classList.add('hidden'); optArea.classList.remove('hidden'); optArea.innerHTML = "";
                const isEng = Math.random() > 0.5;
                const correct = isEng ? item.posGroups[0].trans : item.word;
                qText.innerText = isEng ? item.word : item.posGroups[0].trans;
                
                let opts = [correct];
                let pool = window.vocabulary.filter(v => v.id !== item.id);
                pool.sort(() => Math.random() - 0.5);
                opts.push(...pool.slice(0, 3).map(v => isEng ? v.posGroups[0].trans : v.word));
                opts.sort(() => Math.random() - 0.5).forEach(o => {
                    const btn = document.createElement('button'); btn.className = 'primary-btn';
                    btn.style.background = "#fff"; btn.style.color = "#333"; btn.style.border = "1px solid #ddd"; btn.innerText = o;
                    btn.onclick = () => {
                        if (o === correct) window.showFeedback(true, "太棒了！");
                        else { wrongWords.push(item); window.showFeedback(false, `錯誤！正確答案是：${correct}`); }
                    }; optArea.appendChild(btn);
                });
            } else {
                optArea.classList.add('hidden'); spellArea.classList.remove('hidden');
                qText.innerText = "聽音拼字";
                const input = document.getElementById('spelling-input');
                input.value = "";
                input.focus();
                window.speakQuizWord();
            }
        }

        window.speakQuizWord = function() { window.speakText(quizQueue[quizIdx].word); };

        window.submitSpelling = function() {
            const item = quizQueue[quizIdx];
            const input = document.getElementById('spelling-input').value.trim().toLowerCase();
            const correct = item.word.toLowerCase();
            if (input === correct) {
                window.showFeedback(true, "正確！");
            } else {
                wrongWords.push(item);
                window.showFeedback(false, `錯誤！正確答案是：${item.word}`);
            }
        };

        // --- 浮窗控制 ---
        window.showFeedback = function(isCorrect, msg) {
            feedbackCorrect = isCorrect;
            const overlay = document.getElementById('feedback-overlay');
            const icon = document.getElementById('feedback-icon');
            const text = document.getElementById('feedback-text');
            const btn = document.getElementById('feedback-btn');
            
            overlay.style.display = 'flex';
            text.innerText = msg;
            
            if (isCorrect) {
                icon.innerText = "✅";
                icon.style.color = "var(--success)";
                btn.style.display = 'none';
                setTimeout(window.handleFeedbackClose, 1000);
            } else {
                icon.innerText = "❌";
                icon.style.color = "var(--danger)";
                btn.style.display = 'block';
                btn.innerText = "再試一次";
            }
        };

        window.handleFeedbackClose = function() {
            document.getElementById('feedback-overlay').style.display = 'none';
            if (feedbackCorrect) {
                quizIdx++;
                if (quizIdx < quizQueue.length) loadQuizQuestion();
                else showQuizResult();
            } else {
                const input = document.getElementById('spelling-input');
                if (input) { input.value = ""; input.focus(); }
            }
        };

        function showQuizResult() {
            document.getElementById('quiz-interface').classList.add('hidden');
            document.getElementById('result-interface').classList.remove('hidden');
            document.getElementById('score-text').innerText = `分數：${quizQueue.length - [...new Set(wrongWords)].length} / ${quizQueue.length}`;
            const area = document.getElementById('wrong-words-list'); area.innerHTML = "<h4>需要加強：</h4>";
            [...new Set(wrongWords)].forEach(w => {
                area.innerHTML += `<div class="manage-item"><b>${w.word}</b> - ${w.posGroups[0].trans}</div>`;
            });
        }

        // --- 輔助與管理功能 ---
        function getVisibleList() { let list = window.vocabulary; if (window.currentUnit !== "all") list = list.filter(v => v.unit === window.currentUnit); return list.filter(v => v.visible); }
        window.saveUserData = function() { set(ref(db, 'users/' + window.currentUser), { vocabulary: window.vocabulary }); };
        window.flipCard = function() { window.isFlipped = !window.isFlipped; window.updateUI(); };
        window.changeWord = function(n) { const list = getVisibleList(); if(list.length===0) return; window.currentIndex = (window.currentIndex + n + list.length) % list.length; window.isFlipped = false; window.updateUI(); };
        window.setUnitMode = function(u) { window.currentUnit = u; window.currentIndex = 0; window.updateUI(); };
        function updateUnitSelector() { const s = document.getElementById('unit-nav-selector'); const units = [...new Set(window.vocabulary.map(v => v.unit))]; s.innerHTML = '<option value="all">📚 所有單元</option>'; units.forEach(u => s.innerHTML += `<option value="${u}">📖 ${u}</option>`); s.value = window.currentUnit; }
        window.exitQuiz = function() { document.getElementById('quiz-interface').classList.add('hidden'); document.getElementById('result-interface').classList.add('hidden'); document.getElementById('study-interface').classList.remove('hidden'); window.updateUI(); };
        window.addPosField = function(t="", p="n.", e="") {
            const div = document.createElement('div'); div.className='pos-entry';
            div.innerHTML = `<button class="remove-pos-btn" onclick="this.parentElement.remove()">✕</button><select class="ps"><option value="n." ${p=='n.'?'selected':''}>n.</option><option value="v." ${p=='v.'?'selected':''}>v.</option></select><input type="text" class="tr" value="${t}" placeholder="翻譯"><input type="text" class="ex" value="${e}" placeholder="例句">`;
            document.getElementById('pos-container').appendChild(div);
        };
        window.saveWordChange = function() {
            const w = document.getElementById('edit-word-eng').value.trim();
            const grps = []; document.querySelectorAll('.pos-entry').forEach(d => { grps.push({pos: d.querySelector('.ps').value, trans: d.querySelector('.tr').value, ex: d.querySelector('.ex').value}); });
            if(editingId) { const idx = window.vocabulary.findIndex(v=>v.id===editingId); window.vocabulary[idx] = {...window.vocabulary[idx], word:w, posGroups:grps}; }
            else { window.vocabulary.push({id:Date.now(), word:w, posGroups:grps, unit:document.getElementById('edit-word-unit').value || "未分類", visible:true}); }
            window.saveUserData(); document.getElementById('wordEditModal').style.display='none';
        };
        window.openManageModal = function() {
            const container = document.getElementById('manage-list-container'); container.innerHTML = "";
            window.vocabulary.forEach(item => { container.innerHTML += `<div class="manage-item"><input type="checkbox" ${item.visible?'checked':''} onchange="window.toggleVis(${item.id})"> ${item.word}</div>`; });
            document.getElementById('manageModal').style.display='flex';
        };
        window.toggleVis = function(id) { const i = window.vocabulary.find(v=>v.id===id); i.visible = !i.visible; window.saveUserData(); };
        window.closeManageModal = function() { document.getElementById('manageModal').style.display = 'none'; };
        window.closeEditModal = function() { document.getElementById('wordEditModal').style.display = 'none'; };
        window.openEditFromCard = function(e) { 
            e.stopPropagation(); const list = getVisibleList(); if(list.length===0) return; const item = list[window.currentIndex % list.length];
            editingId = item.id; document.getElementById('edit-word-eng').value = item.word; document.getElementById('edit-word-unit').value = item.unit; document.getElementById('pos-container').innerHTML = "";
            item.posGroups.forEach(g => window.addPosField(g.trans, g.pos, g.ex));
            document.getElementById('wordEditModal').style.display = 'flex';
        };
        window.toggleStar = function() {}; window.cycleVoiceMode = function() {};
        
        // 監聽 Enter 鍵在拼字模式生效
        document.getElementById('spelling-input')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') window.submitSpelling();
        });
    </script>
</body>
</html>
