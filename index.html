<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordMaster - 雲端同步修正版</title>
    <style>
        :root { --primary: #4a90e2; --success: #34c759; --danger: #ff3b30; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; color: #333; margin: 0; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        /* 介面容器 */
        #login-interface, #study-interface, #quiz-interface, #result-interface { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; text-align: center; }

        /* 單字卡 */
        .card { width: 100%; min-height: 280px; background: var(--card-bg); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; position: relative; box-sizing: border-box; cursor: pointer; }
        
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 12px; font-size: 1rem; font-family: inherit; }
        .primary-btn { padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-circle { width: 60px; height: 60px; border-radius: 50%; border: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .chip { padding: 8px 18px; border-radius: 20px; background: #e0e0e0; cursor: pointer; font-size: 14px; border: none; margin: 4px; }
        .chip.active { background: var(--primary); color: white; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 320px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; text-align: left; }
        
        .opt-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: white; cursor: pointer; margin-bottom: 10px; }
        .opt-btn.correct { background: var(--success) !important; color: white; }
        .opt-btn.wrong { background: var(--danger) !important; color: white; }

        #toast { visibility: hidden; background: #333; color: #fff; padding: 12px 24px; border-radius: 50px; position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); opacity: 0; transition: 0.3s; z-index: 2000; }
        #toast.show { visibility: visible; opacity: 1; bottom: 70px; }
        .list-item-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #f9f9f9; border-radius: 10px; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div id="login-interface">
        <h2 style="color: var(--primary);">WordMaster Cloud</h2>
        <p>輸入名字開始同步</p>
        <input type="text" id="user-name-input" placeholder="例如：Ella">
        <button class="primary-btn" onclick="window.login()">登入並同步</button>
    </div>

    <div id="study-interface" class="hidden">
        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 10px;">
            <span id="user-display" style="font-weight: bold; color: var(--primary);"></span>
            <button onclick="location.reload()" style="background:none; border:none; color:#999; text-decoration:underline;">登出</button>
        </div>
        
        <div style="display:flex; gap:10px; width:100%; margin-bottom:15px;">
            <select id="unit-nav-selector" onchange="window.setUnitMode(this.value)" style="margin-bottom:0; flex-grow: 1;"></select>
            <button onclick="window.openAddModal()" style="padding:0 15px; border-radius:10px; border:none; background:var(--success); color:white; cursor:pointer; font-weight:bold;">+</button>
        </div>

        <div class="card" onclick="window.flipCard()">
            <div style="position: absolute; top: 20px; right: 20px; font-size: 24px; color: #ccc;" onclick="window.openManageModal(event)">⋯</div>
            <h1 id="word-display">載入中...</h1>
            <div id="detail-display" style="display: none; text-align: center; width: 100%;">
                <h2 style="margin-top:0;"><span id="trans-display"></span> <small id="pos-display" style="color:var(--primary); font-size: 0.9rem;"></small></h2>
                <p id="example-display" style="background: #f3f4f6; padding: 15px; border-radius: 12px; font-size: 0.9rem;"></p>
                <div id="note-display" style="color: #666; font-size: 0.8rem; border-top: 1px dashed #ddd; padding-top: 8px; font-style: italic;"></div>
            </div>
        </div>

        <div style="display: flex; gap: 20px; margin-top: 20px;">
            <button class="btn-circle" onclick="window.changeWord(-1)">←</button>
            <button id="star-btn" class="btn-circle" onclick="window.toggleStar()">☆</button>
            <button class="btn-circle" onclick="window.changeWord(1)">→</button>
        </div>

        <button class="primary-btn" onclick="window.startQuiz()">開始測驗</button>
        <div id="custom-folder-bar" style="margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center;"></div>
    </div>

    <div id="quiz-interface" class="hidden">
        <div style="margin-bottom: 15px; font-weight: bold; color: var(--primary);">測驗：<span id="quiz-progress"></span></div>
        <div class="card" style="cursor: default;"><div id="quiz-question-text" style="font-size: 1.3rem; font-weight: bold; margin-bottom: 15px;"></div><div id="quiz-options-area" style="width:100%"></div></div>
    </div>

    <div id="result-interface" class="hidden">
        <h2>測驗結束</h2><p id="score-text" style="font-weight:bold;"></p><div id="wrong-words-list" style="width:100%;"></div><button class="primary-btn" onclick="window.exitQuiz()">返回學習</button>
    </div>

    <div id="wordEditModal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top:0">單字資訊</h3>
            <input list="units-datalist" id="edit-word-unit" placeholder="單元名稱">
            <datalist id="units-datalist"></datalist>
            <input type="text" id="edit-word-eng" placeholder="英文單字">
            <select id="edit-word-pos">
                <option value="n.">n. (名詞)</option><option value="v.">v. (動詞)</option><option value="adj.">adj. (形容詞)</option><option value="adv.">adv. (副詞)</option><option value="phr.">phr. (片語)</option>
            </select>
            <input type="text" id="edit-word-chi" placeholder="中文翻譯">
            <textarea id="edit-word-ex" placeholder="例句" rows="2"></textarea>
            <textarea id="edit-word-note" placeholder="備註 (選填)" rows="2"></textarea>
            <button class="primary-btn" style="background:var(--success)" onclick="window.saveWordChange()">儲存變更</button>
            <button id="delete-btn" class="primary-btn" style="background:var(--danger); display:none;" onclick="window.deleteWord()">刪除此字卡</button>
            <button class="primary-btn" style="background:#888; margin-top:10px;" onclick="window.closeEditModal()">取消</button>
        </div>
    </div>

    <div id="manageModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0">管理單字</h3>
            <button class="primary-btn" style="background:#f39c12; margin-bottom:15px;" onclick="window.openEditFromManage()">✏️ 編輯單字內容</button>
            <div style="border-top:1px solid #eee; padding-top:15px;">
                <p style="font-size:0.8rem; color:#666;">加入到清單：</p>
                <div id="existing-lists-area" style="max-height:120px; overflow-y:auto; margin-bottom:10px;"></div>
                <input type="text" id="new-list-name" placeholder="新清單名稱...">
                <button class="primary-btn" onclick="window.handleCreateAndAdd()">建立並加入</button>
            </div>
            <button class="primary-btn" style="background:#888; margin-top:10px;" onclick="window.closeManageModal()">關閉</button>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa-uQsB27p4adt7_c074zitJTJUm9R57c",
            authDomain: "word-32e5c.firebaseapp.com",
            databaseURL: "https://word-32e5c-default-rtdb.firebaseio.com",
            projectId: "word-32e5c",
            storageBucket: "word-32e5c.firebasestorage.app",
            messagingSenderId: "1065772631955",
            appId: "1:1065772631955:web:5c8e44b1d95560e3224a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 全域變數
        window.currentUser = "";
        window.vocabulary = [];
        window.customLists = [];
        window.currentUnit = "all";
        window.currentCustomList = "none";
        window.currentIndex = 0;
        window.isFlipped = false;
        let editingId = null;
        let quizQueue = [], quizIdx = 0, wrongWords = [];

        // --- 登入與資料同步 ---
        window.login = function() {
            const name = document.getElementById('user-name-input').value.trim();
            if (!name) { alert("請輸入名字"); return; }
            window.currentUser = name;
            
            document.getElementById('login-interface').classList.add('hidden');
            document.getElementById('study-interface').classList.remove('hidden');
            document.getElementById('user-display').innerText = "👤 " + window.currentUser;
            
            const userRef = ref(db, 'users/' + window.currentUser);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    window.vocabulary = data.vocabulary || [];
                    window.customLists = data.customLists || [];
                } else {
                    window.vocabulary = [{ id: 1, unit: "歡迎", word: "Start", pos: "v.", trans: "開始", ex: "Welcome to WordMaster!", note: "點擊右上角 + 新增單字", starred: false, myLists: [] }];
                    window.customLists = [];
                }
                updateUnitSelector();
                window.updateUI();
            });
        };

        window.saveUserData = function() {
            if (!window.currentUser) return;
            set(ref(db, 'users/' + window.currentUser), {
                vocabulary: window.vocabulary,
                customLists: window.customLists
            });
        };

        // --- UI 控制 ---
        window.updateUI = function() {
            const list = getFilteredList();
            const wd = document.getElementById('word-display');
            const dd = document.getElementById('detail-display');
            if (list.length === 0) {
                wd.innerText = "目前無單字";
                wd.style.display = 'block';
                dd.style.display = 'none';
                return;
            }
            const item = list[window.currentIndex % list.length];
            wd.innerText = item.word;
            document.getElementById('trans-display').innerText = item.trans;
            document.getElementById('pos-display').innerText = `(${item.pos || 'n.'})`;
            document.getElementById('example-display').innerText = item.ex || "(無例句)";
            document.getElementById('note-display').innerText = item.note || "";
            document.getElementById('star-btn').innerText = item.starred ? "★" : "☆";
            document.getElementById('star-btn').style.color = item.starred ? "#ffd700" : "#333";
            renderFolderBar();
        };

        function getFilteredList() {
            let list = window.vocabulary;
            if (window.currentUnit !== "all") list = list.filter(v => v.unit === window.currentUnit);
            if (window.currentCustomList !== "none") list = list.filter(v => v.myLists && v.myLists.includes(window.currentCustomList));
            return list;
        }

        function updateUnitSelector() {
            const s = document.getElementById('unit-nav-selector');
            const units = [...new Set(window.vocabulary.map(v => v.unit))];
            s.innerHTML = '<option value="all">📚 所有單元</option>';
            units.forEach(u => s.innerHTML += `<option value="${u}">📖 ${u}</option>`);
            s.value = window.currentUnit;
            const dl = document.getElementById('units-datalist');
            dl.innerHTML = "";
            units.forEach(u => dl.innerHTML += `<option value="${u}">`);
        }

        window.flipCard = function() {
            if(getFilteredList().length === 0) return;
            window.isFlipped = !window.isFlipped;
            document.getElementById('detail-display').style.display = window.isFlipped ? 'block' : 'none';
            document.getElementById('word-display').style.display = window.isFlipped ? 'none' : 'block';
        };

        window.changeWord = function(n) {
            window.currentIndex += n;
            if (window.currentIndex < 0) window.currentIndex = 0;
            window.isFlipped = false;
            window.updateUI();
        };

        window.toggleStar = function() {
            const list = getFilteredList();
            const item = list[window.currentIndex % list.length];
            if (item) {
                item.starred = !item.starred;
                window.saveUserData();
            }
        };

        window.setUnitMode = function(u) { window.currentUnit = u; window.currentIndex = 0; window.updateUI(); };
        window.setListMode = function(l) { window.currentCustomList = l; window.currentIndex = 0; window.updateUI(); };

        // --- 字卡管理 ---
        window.openAddModal = function() {
            editingId = null;
            document.getElementById('modal-title').innerText = "新增字卡";
            document.getElementById('delete-btn').style.display = 'none';
            document.getElementById('edit-word-unit').value = window.currentUnit === "all" ? "" : window.currentUnit;
            document.getElementById('edit-word-eng').value = "";
            document.getElementById('edit-word-chi').value = "";
            document.getElementById('edit-word-ex').value = "";
            document.getElementById('edit-word-note').value = "";
            document.getElementById('wordEditModal').style.display = 'flex';
        };

        window.saveWordChange = function() {
            const unit = document.getElementById('edit-word-unit').value || "未分類";
            const word = document.getElementById('edit-word-eng').value.trim();
            const pos = document.getElementById('edit-word-pos').value;
            const trans = document.getElementById('edit-word-chi').value.trim();
            if (!word || !trans) { alert("請填寫單字與翻譯"); return; }

            if (editingId) {
                const idx = window.vocabulary.findIndex(v => v.id === editingId);
                window.vocabulary[idx] = { ...window.vocabulary[idx], unit, word, pos, trans, ex: document.getElementById('edit-word-ex').value, note: document.getElementById('edit-word-note').value };
            } else {
                window.vocabulary.push({ id: Date.now(), unit, word, pos, trans, ex: document.getElementById('edit-word-ex').value, note: document.getElementById('edit-word-note').value, starred: false, myLists: [] });
            }
            window.saveUserData();
            window.closeEditModal();
        };

        window.deleteWord = function() {
            if (!confirm("確定要刪除這張字卡嗎？")) return;
            window.vocabulary = window.vocabulary.filter(v => v.id !== editingId);
            window.saveUserData();
            window.closeEditModal();
        };

        window.closeEditModal = function() { document.getElementById('wordEditModal').style.display = 'none'; };

        window.openManageModal = function(e) {
            e.stopPropagation();
            const area = document.getElementById('existing-lists-area');
            area.innerHTML = "";
            window.customLists.forEach(name => {
                const div = document.createElement('div');
                div.className = 'list-item-row';
                div.innerHTML = `<span>+ ${name}</span><button style="color:red; border:none; background:none; cursor:pointer;" onclick="window.deleteList('${name}')">🗑️</button>`;
                div.querySelector('span').onclick = () => {
                    const item = getFilteredList()[window.currentIndex % getFilteredList().length];
                    if (item && !item.myLists.includes(name)) {
                        if(!item.myLists) item.myLists = [];
                        item.myLists.push(name);
                        window.saveUserData();
                        showToast(`已加入「${name}」`);
                    }
                    window.closeManageModal();
                };
                area.appendChild(div);
            });
            document.getElementById('manageModal').style.display = 'flex';
        };

        window.deleteList = function(name) {
            if(!confirm(`刪除清單「${name}」？單字不會消失。`)) return;
            window.customLists = window.customLists.filter(l => l !== name);
            window.vocabulary.forEach(v => { if(v.myLists) v.myLists = v.myLists.filter(l => l !== name); });
            window.saveUserData();
            window.openManageModal({stopPropagation:()=>{}});
        };

        window.handleCreateAndAdd = function() {
            const n = document.getElementById('new-list-name').value.trim();
            if (n) {
                if (!window.customLists.includes(n)) { window.customLists.push(n); }
                const item = getFilteredList()[window.currentIndex % getFilteredList().length];
                if (item) {
                    if(!item.myLists) item.myLists = [];
                    if(!item.myLists.includes(n)) item.myLists.push(n);
                }
                window.saveUserData();
                document.getElementById('new-list-name').value = "";
                window.closeManageModal();
            }
        };

        window.closeManageModal = function() { document.getElementById('manageModal').style.display = 'none'; };
        
        window.openEditFromManage = function() {
            const item = getFilteredList()[window.currentIndex % getFilteredList().length];
            if(!item) return;
            editingId = item.id;
            document.getElementById('modal-title').innerText = "編輯字卡";
            document.getElementById('delete-btn').style.display = 'block';
            document.getElementById('edit-word-unit').value = item.unit;
            document.getElementById('edit-word-eng').value = item.word;
            document.getElementById('edit-word-pos').value = item.pos || "n.";
            document.getElementById('edit-word-chi').value = item.trans;
            document.getElementById('edit-word-ex').value = item.ex || "";
            document.getElementById('edit-word-note').value = item.note || "";
            window.closeManageModal();
            document.getElementById('wordEditModal').style.display = 'flex';
        };

        // --- 測驗系統 ---
        window.startQuiz = function() {
            quizQueue = [...getFilteredList()];
            if (quizQueue.length < 2) { alert("單字量不足以開啟測驗"); return; }
            quizQueue.sort(() => Math.random() - 0.5);
            quizIdx = 0; wrongWords = [];
            document.getElementById('study-interface').classList.add('hidden');
            document.getElementById('quiz-interface').classList.remove('hidden');
            loadQuestion();
        };

        function loadQuestion() {
            const item = quizQueue[quizIdx];
            document.getElementById('quiz-progress').innerText = `${quizIdx+1}/${quizQueue.length}`;
            const area = document.getElementById('quiz-options-area'); area.innerHTML = "";
            const isEng = Math.random() > 0.5;
            document.getElementById('quiz-question-text').innerText = isEng ? item.word : `${item.trans} (${item.pos || 'n.'})`;
            const correctText = isEng ? `${item.trans} (${item.pos || 'n.'})` : item.word;
            
            let opts = [correctText];
            let pool = window.vocabulary.filter(v => v.id !== item.id);
            pool.sort(() => Math.random() - 0.5);
            opts.push(...pool.slice(0, 3).map(v => isEng ? `${v.trans} (${v.pos || 'n.'})` : v.word));
            opts.sort(() => Math.random() - 0.5);

            opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = o;
                b.onclick = () => {
                    if(o === correctText) b.style.background = "var(--success)";
                    else {
                        b.style.background = "var(--danger)";
                        wrongWords.push(item);
                        document.querySelectorAll('.opt-btn').forEach(x => { if(x.innerText === correctText) x.style.background = "var(--success)"; });
                    }
                    setTimeout(() => { quizIdx++; if(quizIdx < quizQueue.length) loadQuestion(); else showResults(); }, 1200);
                }; area.appendChild(b);
            });
        }

        function showResults() {
            document.getElementById('quiz-interface').classList.add('hidden');
            document.getElementById('result-interface').classList.remove('hidden');
            document.getElementById('score-text').innerText = `答對：${quizQueue.length - wrongWords.length} / ${quizQueue.length}`;
            const area = document.getElementById('wrong-words-list'); area.innerHTML = "";
            wrongWords.forEach(w => {
                const div = document.createElement('div'); div.className = 'list-item-row';
                div.innerHTML = `<span><strong>${w.word}</strong> - ${w.trans}</span>`;
                area.appendChild(div);
            });
        }
        window.exitQuiz = function() { document.getElementById('result-interface').classList.add('hidden'); document.getElementById('study-interface').classList.remove('hidden'); window.updateUI(); };

        function renderFolderBar() {
            const bar = document.getElementById('custom-folder-bar');
            bar.innerHTML = `<button class="chip ${window.currentCustomList==='none'?'active':''}" onclick="window.setListMode('none')">全部</button>`;
            window.customLists.forEach(l => {
                bar.innerHTML += `<button class="chip ${window.currentCustomList===l?'active':''}" onclick="window.setListMode('${l}')">${l}</button>`;
            });
        }

        function showToast(m) { const t = document.getElementById("toast"); t.innerText = m; t.className = "show"; setTimeout(() => t.className = "", 2500); }
    </script>
</body>
</html>
