<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordMaster</title>
    <style>
        :root { --primary: #4a90e2; --success: #34c759; --danger: #ff3b30; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; color: #333; margin: 0; box-sizing: border-box; }
        .hidden { display: none !important; }
        #login-interface, #study-interface, #quiz-interface, #result-interface { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        .card { width: 100%; min-height: 380px; background: var(--card-bg); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; position: relative; box-sizing: border-box; cursor: pointer; }
        .card-more-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; color: #ccc; padding: 5px; cursor: pointer; z-index: 10; }
        
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 12px; font-size: 1.1rem; font-family: inherit; }
        .primary-btn { padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-circle { width: 60px; height: 60px; border-radius: 50%; border: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        
        .nav-control-btn { height: 46px; padding: 0 12px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; }
        .btn-voice.active-us { background: #e3f2fd; color: #1e88e5; border-color: #1e88e5; }
        .btn-voice.active-uk { background: #fce4ec; color: #d81b60; border-color: #d81b60; }
        
        .accent-btns { display: flex; gap: 10px; margin-top: 15px; }
        .accent-btn { padding: 5px 15px; border-radius: 20px; border: 1px solid #eee; background: #fdfdfd; font-size: 0.8rem; font-weight: bold; color: #888; cursor: pointer; }

        .pos-group-display { text-align: left; width: 100%; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .pos-header { font-size: 1.3rem; margin-bottom: 8px; font-weight: bold; }
        .pos-tag { color: var(--primary); margin-right: 8px; }
        
        /* 例句區塊 */
        .ex-container { background: #f3f4f6; padding: 12px; border-radius: 10px; margin-top: 5px; position: relative; }
        .ex-text { font-size: 1.1rem; line-height: 1.5; color: #333; padding-right: 60px; }
        .ex-trans { font-size: 1rem; color: #666; margin-top: 4px; padding-right: 60px; }
        .ex-voice-btns { position: absolute; top: 10px; right: 8px; display: flex; flex-direction: column; gap: 4px; }
        .ex-voice-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ddd; background: white; font-size: 10px; font-weight: bold; color: #666; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #note-display { color: #777; font-size: 1.05rem; border-top: 1px dashed #ccc; padding-top: 10px; font-style: italic; width: 100%; text-align: left; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 95%; max-width: 400px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; text-align: left; position: relative; }
        
        .pos-entry { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--primary); position: relative; }
        .remove-pos-btn { position: absolute; top: 5px; right: 5px; color: var(--danger); background: none; border: none; cursor: pointer; font-weight: bold; }
        .manage-item { display: flex; align-items: center; background: #f9f9f9; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .manage-item input[type="checkbox"] { width: 20px; height: 20px; margin-right: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-interface">
        <h2 style="color: var(--primary);">WordMaster</h2>
        <input type="text" id="user-name-input" placeholder="輸入名字開始同步">
        <button class="primary-btn" onclick="window.login()">登入並同步</button>
    </div>

    <div id="study-interface" class="hidden">
        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 10px;">
            <span id="user-display" style="font-weight: bold; color: var(--primary);"></span>
            <button onclick="location.reload()" style="background:none; border:none; color:#999; text-decoration:underline; cursor:pointer;">登出</button>
        </div>
        
        <div style="display:flex; gap:6px; width:100%; margin-bottom:15px; align-items: center;">
            <select id="unit-nav-selector" onchange="window.setUnitMode(this.value)" style="margin-bottom:0; flex-grow: 1; height: 46px;"></select>
            <button id="voice-toggle-btn" class="nav-control-btn btn-voice" onclick="window.cycleVoiceMode()">控制</button>
            <button class="nav-control-btn" onclick="window.openManageModal()">☰</button>
            <button class="nav-control-btn" style="background:var(--success); color:white; border:none;" onclick="window.openAddModal()">+</button>
        </div>

        <div class="card" onclick="window.flipCard()">
            <div class="card-more-btn" onclick="window.openEditFromCard(event)">⋯</div>
            <h1 id="word-display" style="font-size: 3.2rem; margin-bottom: 10px;">載入中...</h1>
            <div id="accent-box" class="accent-btns">
                <div class="accent-btn" onclick="window.speakText(null, event, 'en-US')">🔊 US</div>
                <div class="accent-btn" onclick="window.speakText(null, event, 'en-GB')">🔊 UK</div>
            </div>
            <div id="detail-display" style="display: none; width: 100%;">
                <div id="pos-groups-area"></div>
                <div id="note-display"></div>
            </div>
        </div>

        <div style="display: flex; gap: 20px; margin-top: 20px;">
            <button class="btn-circle" onclick="window.changeWord(-1)">←</button>
            <button id="star-btn" class="btn-circle" onclick="window.toggleStar()">☆</button>
            <button class="btn-circle" onclick="window.changeWord(1)">→</button>
        </div>
        <button class="primary-btn" onclick="window.startQuiz()">開始測驗</button>
    </div>

    <div id="wordEditModal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top:0">編輯單字</h3>
            <input type="text" id="edit-word-unit" placeholder="單元">
            <input type="text" id="edit-word-eng" placeholder="英文單字">
            <div id="pos-container"></div>
            <button class="primary-btn" style="background:#eee; color:#333; margin-bottom:15px;" onclick="window.addPosField()">+ 新增翻譯與例句組</button>
            <textarea id="edit-word-note" placeholder="備註" rows="2"></textarea>
            <button class="primary-btn" style="background:var(--success)" onclick="window.saveWordChange()">儲存雲端</button>
            <button id="delete-btn" class="primary-btn" style="background:var(--danger); display:none;" onclick="window.deleteWord()">刪除單字</button>
            <button class="primary-btn" style="background:#888; margin-top:10px;" onclick="window.closeEditModal()">取消</button>
        </div>
    </div>

    <div id="manageModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0">清單管理</h3>
                <button onclick="window.closeManageModal()" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">✕</button>
            </div>
            <button id="unit-delete-btn" class="primary-btn" style="background:var(--danger); margin-bottom:20px; display:none;" onclick="window.deleteCurrentUnit()">🗑️ 刪除整個單元</button>
            <div id="manage-list-container"></div>
            <button class="primary-btn" style="background:#888; margin-top:20px; width: 100%;" onclick="window.closeManageModal()">關閉</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCa-uQsB27p4adt7_c074zitJTJUm9R57c", authDomain: "word-32e5c.firebaseapp.com", databaseURL: "https://word-32e5c-default-rtdb.firebaseio.com", projectId: "word-32e5c", storageBucket: "word-32e5c.firebasestorage.app", messagingSenderId: "1065772631955", appId: "1:1065772631955:web:5c8e44b1d95560e3224a66" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.currentUser = ""; window.vocabulary = []; window.currentUnit = "all"; window.currentIndex = 0; window.isFlipped = false; window.voiceMode = "off";
        let editingId = null;

        window.login = function() {
            const name = document.getElementById('user-name-input').value.trim();
            if (!name) return alert("請輸入名字");
            window.currentUser = name;
            document.getElementById('login-interface').classList.add('hidden');
            document.getElementById('study-interface').classList.remove('hidden');
            onValue(ref(db, 'users/' + window.currentUser), (snap) => {
                const data = snap.val();
                if (data) {
                    window.vocabulary = (data.vocabulary || []).map(v => {
                        if (!v.posGroups) v.posGroups = [{ pos: v.pos || 'n.', trans: v.trans || '無翻譯', ex: '', exTrans: '' }];
                        if (v.visible === undefined) v.visible = true;
                        return v;
                    });
                }
                updateUnitSelector();
                window.updateUI();
            });
        };

        window.cycleVoiceMode = function() {
            const btn = document.getElementById('voice-toggle-btn');
            if (window.voiceMode === "off") { window.voiceMode = "us"; btn.innerText = "🔊 US"; btn.classList.add('active-us'); }
            else if (window.voiceMode === "us") { window.voiceMode = "uk"; btn.innerText = "🔊 UK"; btn.classList.replace('active-us', 'active-uk'); }
            else { window.voiceMode = "off"; btn.innerText = "🔇"; btn.classList.remove('active-uk'); }
            if (window.voiceMode !== "off") window.speakCurrent();
        };

        window.speakText = function(text, e, langCode) {
            if(e) e.stopPropagation();
            const list = getVisibleList();
            if (list.length === 0 && !text) return;
            const targetText = text || list[window.currentIndex % list.length].word;
            const targetLang = langCode || (window.voiceMode === "uk" ? "en-GB" : "en-US");
            const utterance = new SpeechSynthesisUtterance(targetText);
            utterance.lang = targetLang;
            utterance.rate = 0.95;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        };

        window.speakCurrent = function() {
            const list = getVisibleList();
            if (list.length === 0) return;
            const item = list[window.currentIndex % list.length];
            const lang = (window.voiceMode === "uk") ? "en-GB" : "en-US";
            if (!window.isFlipped) window.speakText(item.word, null, lang);
            else {
                let firstEx = item.posGroups.find(g => g.ex)?.ex || "";
                window.speakText(item.word + ". " + firstEx, null, lang);
            }
        };

        window.updateUI = function() {
            const visibleList = getVisibleList();
            const wd = document.getElementById('word-display');
            const dd = document.getElementById('detail-display');
            const area = document.getElementById('pos-groups-area');
            const ab = document.getElementById('accent-box');
            if (visibleList.length === 0) { wd.innerText = "無單字"; wd.style.display = 'block'; dd.style.display = 'none'; ab.style.display='none'; return; }
            const item = visibleList[window.currentIndex % visibleList.length];
            wd.innerText = item.word;
            if (window.voiceMode !== "off") window.speakCurrent();
            area.innerHTML = "";
            item.posGroups.forEach(g => {
                let exHtml = "";
                if (g.ex) {
                    exHtml = `
                        <div class="ex-container">
                            <div class="ex-text">${g.ex}</div>
                            ${g.exTrans ? `<div class="ex-trans">${g.exTrans}</div>` : ""}
                            <div class="ex-voice-btns">
                                <button class="ex-voice-btn" onclick="window.speakText('${g.ex.replace(/'/g, "\\'")}', event, 'en-US')">U</button>
                                <button class="ex-voice-btn" onclick="window.speakText('${g.ex.replace(/'/g, "\\'")}', event, 'en-GB')">K</button>
                            </div>
                        </div>`;
                }
                area.innerHTML += `<div class="pos-group-display"><div class="pos-header"><span class="pos-tag">(${g.pos})</span>${g.trans}</div>${exHtml}</div>`;
            });
            document.getElementById('note-display').innerText = item.note || "";
            dd.style.display = window.isFlipped ? 'block' : 'none';
            wd.style.display = window.isFlipped ? 'none' : 'block';
            ab.style.display = window.isFlipped ? 'none' : 'flex';
        };

        window.saveUserData = function() { if (!window.currentUser) return; set(ref(db, 'users/' + window.currentUser), { vocabulary: window.vocabulary }); };
        window.flipCard = function() { if(getVisibleList().length===0) return; window.isFlipped = !window.isFlipped; window.updateUI(); };
        window.changeWord = function(n) { const list = getVisibleList(); if(list.length===0) return; window.currentIndex = (window.currentIndex + n + list.length) % list.length; window.isFlipped = false; window.updateUI(); };
        window.setUnitMode = function(u) { window.currentUnit = u; window.currentIndex = 0; window.updateUI(); };
        
        window.openAddModal = function() { 
            editingId = null; 
            document.getElementById('pos-container').innerHTML = ""; 
            document.getElementById('edit-word-unit').value = (window.currentUnit==="all"?"":window.currentUnit); 
            document.getElementById('edit-word-eng').value = ""; 
            document.getElementById('edit-word-note').value = ""; 
            window.addPosField(); 
            document.getElementById('wordEditModal').style.display = 'flex'; 
        };

        window.addPosField = function(trans = "", pos = "n.", ex = "", exTrans = "") {
            const div = document.createElement('div'); div.className = 'pos-entry';
            div.innerHTML = `
                <button class="remove-pos-btn" onclick="this.parentElement.remove()">✕</button>
                <select class="ps"><option value="n." ${pos==='n.'?'selected':''}>n.</option><option value="v." ${pos==='v.'?'selected':''}>v.</option><option value="adj." ${pos==='adj.'?'selected':''}>adj.</option></select>
                <input type="text" class="tr" placeholder="翻譯" value="${trans}">
                <textarea class="ex" placeholder="例句" rows="2">${ex}</textarea>
                <textarea class="extr" placeholder="例句翻譯" rows="1">${exTrans}</textarea>`;
            document.getElementById('pos-container').appendChild(div);
        };

        window.saveWordChange = function() {
            const w = document.getElementById('edit-word-eng').value.trim();
            const grps = []; document.querySelectorAll('.pos-entry').forEach(d => { 
                grps.push({pos: d.querySelector('.ps').value, trans: d.querySelector('.tr').value, ex: d.querySelector('.ex').value, exTrans: d.querySelector('.extr').value}); 
            });
            if(editingId) { const idx = window.vocabulary.findIndex(v=>v.id===editingId); window.vocabulary[idx] = {...window.vocabulary[idx], word:w, posGroups:grps, unit: document.getElementById('edit-word-unit').value}; }
            else { window.vocabulary.push({id:Date.now(), word:w, posGroups:grps, unit:document.getElementById('edit-word-unit').value || "未分類", visible:true}); }
            window.saveUserData(); window.closeEditModal(); window.updateUI();
        };

        window.openManageModal = function() {
            const container = document.getElementById('manage-list-container'); container.innerHTML = "";
            let scopeList = window.vocabulary.filter(v => window.currentUnit === 'all' || v.unit === window.currentUnit);
            scopeList.forEach(item => {
                const div = document.createElement('div'); div.className = 'manage-item';
                div.innerHTML = `<input type="checkbox" ${item.visible ? 'checked' : ''} onchange="window.toggleVisibility(${item.id})"><div style="flex-grow:1;"><b>${item.word}</b></div><button onclick="window.quickEdit(${item.id})" style="border:none; background:none; cursor:pointer;">✏️</button>`;
                container.appendChild(div);
            });
            document.getElementById('manageModal').style.display = 'flex';
        };

        window.toggleVisibility = function(id) { const item = window.vocabulary.find(v => v.id === id); if (item) { item.visible = !item.visible; window.saveUserData(); window.updateUI(); } };
        window.quickEdit = function(id) {
            const item = window.vocabulary.find(v => v.id === id); if(!item) return; editingId = id;
            document.getElementById('edit-word-unit').value = item.unit; document.getElementById('edit-word-eng').value = item.word; document.getElementById('edit-word-note').value = item.note || "";
            document.getElementById('pos-container').innerHTML = "";
            item.posGroups.forEach(g => window.addPosField(g.trans, g.pos, g.ex, g.exTrans));
            document.getElementById('manageModal').style.display = 'none'; document.getElementById('wordEditModal').style.display = 'flex';
        };

        window.closeManageModal = function() { document.getElementById('manageModal').style.display = 'none'; };
        window.closeEditModal = function() { document.getElementById('wordEditModal').style.display = 'none'; };
        window.openEditFromCard = function(e) { e.stopPropagation(); const list = getVisibleList(); if(list.length > 0) window.quickEdit(list[window.currentIndex % list.length].id); };
        function getVisibleList() { let list = window.vocabulary; if (window.currentUnit !== "all") list = list.filter(v => v.unit === window.currentUnit); return list.filter(v => v.visible); }
        function updateUnitSelector() { const s = document.getElementById('unit-nav-selector'); const units = [...new Set(window.vocabulary.map(v => v.unit))]; s.innerHTML = '<option value="all">📚 所有單元</option>'; units.forEach(u => s.innerHTML += `<option value="${u}">📖 ${u}</option>`); s.value = window.currentUnit; }
        window.toggleStar = function() { const list = getVisibleList(); if (list.length > 0) { const item = list[window.currentIndex % list.length]; item.starred = !item.starred; window.saveUserData(); window.updateUI(); } };
        window.startQuiz = function() { alert("測驗功能請待後續指令開發"); };
    </script>
</body>
</html>
