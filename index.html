<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordMaster</title>
    <style>
        :root { --primary: #4a90e2; --success: #34c759; --danger: #ff3b30; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; color: #333; margin: 0; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        #login-interface, #study-interface, #quiz-interface, #result-interface { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        /* 單字卡 */
        .card { width: 100%; min-height: 350px; background: var(--card-bg); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; position: relative; box-sizing: border-box; cursor: pointer; }
        
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 12px; font-size: 1.1rem; font-family: inherit; }
        
        .primary-btn { padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-circle { width: 60px; height: 60px; border-radius: 50%; border: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        
        /* 下拉選單旁的控制按鈕 */
        .nav-control-btn { height: 46px; padding: 0 15px; border-radius: 10px; border: none; background: #fff; border: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .btn-add { background: var(--success); color: white; border: none; font-weight: bold; }
        
        .chip { padding: 8px 18px; border-radius: 20px; background: #e0e0e0; cursor: pointer; font-size: 14px; border: none; margin: 4px; }
        .chip.active { background: var(--primary); color: white; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 380px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; text-align: left; }
        
        /* 管理清單條目 */
        .manage-item { display: flex; align-items: center; background: #f9f9f9; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .manage-item input[type="checkbox"] { width: 20px; height: 20px; margin-right: 12px; cursor: pointer; margin-bottom: 0; }
        .manage-info { flex-grow: 1; text-align: left; }
        .manage-info b { font-size: 1.1rem; display: block; word-break: break-all; }
        .manage-actions button { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }

        .pos-entry { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--primary); position: relative; }
        .remove-pos-btn { position: absolute; top: 5px; right: 5px; color: var(--danger); background: none; border: none; cursor: pointer; font-weight: bold; }
        
        .pos-group-display { text-align: left; width: 100%; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .pos-header { font-size: 1.3rem; margin-bottom: 8px; font-weight: bold; }
        .pos-tag { color: var(--primary); margin-right: 8px; }
        .ex-container { background: #f3f4f6; padding: 12px; border-radius: 10px; margin-top: 5px; }
        .ex-text, .ex-trans { font-size: 1.15rem; line-height: 1.6; color: #333; }
        
        #note-display { color: #777; font-size: 1.05rem; border-top: 1px dashed #ccc; padding-top: 10px; font-style: italic; width: 100%; text-align: left; }
        .opt-btn { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: white; cursor: pointer; margin-bottom: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="login-interface">
        <h2 style="color: var(--primary);">WordMaster</h2>
        <input type="text" id="user-name-input" placeholder="輸入名字開始同步">
        <button class="primary-btn" onclick="window.login()">登入並同步</button>
    </div>

    <div id="study-interface" class="hidden">
        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 10px;">
            <span id="user-display" style="font-weight: bold; color: var(--primary);"></span>
            <button onclick="location.reload()" style="background:none; border:none; color:#999; text-decoration:underline;">登出</button>
        </div>
        
        <div style="display:flex; gap:8px; width:100%; margin-bottom:15px; align-items: center;">
            <select id="unit-nav-selector" onchange="window.setUnitMode(this.value)" style="margin-bottom:0; flex-grow: 1; height: 46px;"></select>
            <button class="nav-control-btn" onclick="window.openManageModal()" title="管理清單">☰</button>
            <button class="nav-control-btn btn-add" onclick="window.openAddModal()" title="新增單字">+</button>
        </div>

        <div class="card" onclick="window.flipCard()">
            <h1 id="word-display" style="font-size: 3.2rem;">載入中...</h1>
            <div id="detail-display" style="display: none; width: 100%;">
                <div id="pos-groups-area"></div>
                <div id="note-display"></div>
            </div>
        </div>

        <div style="display: flex; gap: 20px; margin-top: 20px;">
            <button class="btn-circle" onclick="window.changeWord(-1)">←</button>
            <button id="star-btn" class="btn-circle" onclick="window.toggleStar()">☆</button>
            <button class="btn-circle" onclick="window.changeWord(1)">→</button>
        </div>

        <button class="primary-btn" onclick="window.startQuiz()">開始測驗</button>
        <div id="custom-folder-bar" style="margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center;"></div>
    </div>

    <div id="wordEditModal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top:0">WordMaster</h3>
            <input list="units-datalist" id="edit-word-unit" placeholder="單元名稱">
            <datalist id="units-datalist"></datalist>
            <input type="text" id="edit-word-eng" placeholder="英文單字">
            <div id="pos-container"></div>
            <button class="primary-btn" style="background:#eee; color:#333; margin-bottom:15px;" onclick="window.addPosField()">+ 新增詞性與翻譯</button>
            <textarea id="edit-word-note" placeholder="備註" rows="2"></textarea>
            <button class="primary-btn" style="background:var(--success)" onclick="window.saveWordChange()">儲存雲端</button>
            <button id="delete-btn" class="primary-btn" style="background:var(--danger); display:none;" onclick="window.deleteWord()">刪除單字</button>
            <button class="primary-btn" style="background:#888; margin-top:10px;" onclick="window.closeEditModal()">取消</button>
        </div>
    </div>

    <div id="manageModal" class="modal">
        <div class="modal-content" style="width: 95%; max-width: 450px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0">單字清單</h3>
                <button onclick="window.closeManageModal()" style="border:none; background:none; font-size:1.5rem;">✕</button>
            </div>
            
            <button id="unit-delete-btn" class="primary-btn" style="background:var(--danger); margin-bottom:20px; display:none;" onclick="window.deleteCurrentUnit()">🗑️ 刪除目前整個單元</button>

            <div id="manage-list-container"></div>
            
            <div style="border-top:1px solid #eee; padding-top:15px; margin-top:15px;">
                <p style="font-size:0.9rem; color:#666;">加入目前的單字至：</p>
                <div id="existing-lists-area" style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="new-list-name" placeholder="建立新清單..." style="margin-bottom:0; flex-grow: 1;">
                    <button class="primary-btn" style="width:auto; white-space:nowrap; margin-top:0;" onclick="window.handleCreateAndAdd()">建立</button>
                </div>
            </div>
        </div>
    </div>

    <div id="quiz-interface" class="hidden">
        <div style="margin-bottom: 15px; font-weight: bold; color: var(--primary);">測驗：<span id="quiz-progress"></span></div>
        <div class="card" style="cursor: default;"><div id="quiz-question-text" style="font-size: 1.4rem; font-weight: bold; margin-bottom: 15px;"></div><div id="quiz-options-area" style="width:100%"></div></div>
    </div>
    <div id="result-interface" class="hidden">
        <h2>測驗結束</h2><p id="score-text" style="font-weight:bold;"></p><div id="wrong-words-list" style="width:100%;"></div><button class="primary-btn" onclick="window.exitQuiz()">返回學習</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCa-uQsB27p4adt7_c074zitJTJUm9R57c",
            authDomain: "word-32e5c.firebaseapp.com",
            databaseURL: "https://word-32e5c-default-rtdb.firebaseio.com",
            projectId: "word-32e5c",
            storageBucket: "word-32e5c.firebasestorage.app",
            messagingSenderId: "1065772631955",
            appId: "1:1065772631955:web:5c8e44b1d95560e3224a66"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.currentUser = "";
        window.vocabulary = [];
        window.customLists = [];
        window.currentUnit = "all";
        window.currentCustomList = "none";
        window.currentIndex = 0;
        window.isFlipped = false;
        let editingId = null;
        let quizQueue = [], quizIdx = 0, wrongWords = [];

        window.login = function() {
            const name = document.getElementById('user-name-input').value.trim();
            if (!name) return alert("請輸入名字");
            window.currentUser = name;
            document.getElementById('login-interface').classList.add('hidden');
            document.getElementById('study-interface').classList.remove('hidden');
            document.getElementById('user-display').innerText = "👤 " + window.currentUser;
            onValue(ref(db, 'users/' + window.currentUser), (snap) => {
                const data = snap.val();
                if (data) {
                    window.vocabulary = (data.vocabulary || []).map(v => {
                        if (!v.posGroups) { v.posGroups = [{ pos: v.pos || 'n.', trans: v.trans || '無翻譯', ex: v.ex || '', exTrans: '' }]; }
                        if (v.visible === undefined) v.visible = true;
                        return v;
                    });
                    window.customLists = data.customLists || [];
                } else {
                    window.vocabulary = [{ id: Date.now(), unit: "歡迎", word: "Start", posGroups: [{pos: "v.", trans: "開始", ex: "", exTrans: ""}], visible: true, starred: false, myLists: [] }];
                    window.saveUserData();
                }
                updateUnitSelector();
                window.updateUI();
            });
        };

        window.saveUserData = function() {
            if (!window.currentUser) return;
            set(ref(db, 'users/' + window.currentUser), { vocabulary: window.vocabulary, customLists: window.customLists });
        };

        window.updateUI = function() {
            const visibleList = getFilteredList().filter(v => v.visible);
            const wd = document.getElementById('word-display');
            const dd = document.getElementById('detail-display');
            const area = document.getElementById('pos-groups-area');

            if (visibleList.length === 0) { wd.innerText = "無可見單字"; wd.style.display = 'block'; dd.style.display = 'none'; return; }
            const item = visibleList[window.currentIndex % visibleList.length];
            wd.innerText = item.word;
            area.innerHTML = "";
            item.posGroups.forEach(g => {
                let exHtml = g.ex ? `<div class="ex-container"><div class="ex-text">${g.ex}</div>${g.exTrans ? `<div class="ex-trans">${g.exTrans}</div>` : ""}</div>` : "";
                area.innerHTML += `<div class="pos-group-display"><div class="pos-header"><span class="pos-tag">(${g.pos})</span>${g.trans}</div>${exHtml}</div>`;
            });
            document.getElementById('note-display').innerText = item.note || "";
            document.getElementById('note-display').style.display = item.note ? "block" : "none";
            dd.style.display = window.isFlipped ? 'block' : 'none';
            wd.style.display = window.isFlipped ? 'none' : 'block';
            document.getElementById('star-btn').innerText = item.starred ? "★" : "☆";
            document.getElementById('star-btn').style.color = item.starred ? "#ffd700" : "#333";
            renderFolderBar();
        };

        window.openManageModal = function() {
            const container = document.getElementById('manage-list-container');
            const unitDelBtn = document.getElementById('unit-delete-btn');
            container.innerHTML = "";
            unitDelBtn.style.display = (window.currentUnit === "all") ? "none" : "block";
            unitDelBtn.innerText = `🗑️ 刪除整個「${window.currentUnit}」`;

            let currentScopeList = window.vocabulary;
            if (window.currentUnit !== "all") currentScopeList = currentScopeList.filter(v => v.unit === window.currentUnit);
            if (window.currentCustomList !== "none") currentScopeList = currentScopeList.filter(v => v.myLists && v.myLists.includes(window.currentCustomList));

            currentScopeList.forEach(item => {
                const div = document.createElement('div');
                div.className = 'manage-item';
                div.innerHTML = `
                    <input type="checkbox" ${item.visible ? 'checked' : ''} onchange="window.toggleVisibility(${item.id})">
                    <div class="manage-info"><b>${item.word}</b><small>${item.posGroups[0].trans}</small></div>
                    <div class="manage-actions">
                        <button onclick="window.quickEdit(${item.id})">✏️</button>
                        <button onclick="window.quickDelete(${item.id})">🗑️</button>
                    </div>`;
                container.appendChild(div);
            });

            const area = document.getElementById('existing-lists-area'); area.innerHTML = "";
            window.customLists.forEach(name => {
                const btn = document.createElement('button'); btn.className = 'chip'; btn.innerText = name;
                btn.onclick = () => {
                    const currentVisible = getFilteredList().filter(v => v.visible);
                    const currentItem = currentVisible[window.currentIndex % currentVisible.length];
                    if (currentItem) {
                        if(!currentItem.myLists) currentItem.myLists = [];
                        if(!currentItem.myLists.includes(name)) currentItem.myLists.push(name);
                        window.saveUserData();
                        alert(`已加入：${name}`);
                    }
                };
                area.appendChild(btn);
            });
            document.getElementById('manageModal').style.display = 'flex';
        };

        window.toggleVisibility = function(id) {
            const item = window.vocabulary.find(v => v.id === id);
            if (item) { item.visible = !item.visible; window.saveUserData(); window.updateUI(); }
        };

        window.quickEdit = function(id) {
            const item = window.vocabulary.find(v => v.id === id);
            if(!item) return;
            editingId = id;
            document.getElementById('edit-word-unit').value = item.unit;
            document.getElementById('edit-word-eng').value = item.word;
            document.getElementById('edit-word-note').value = item.note || "";
            const container = document.getElementById('pos-container');
            container.innerHTML = "";
            item.posGroups.forEach(g => window.addPosField(g.trans, g.pos, g.ex, g.exTrans));
            window.closeManageModal();
            document.getElementById('delete-btn').style.display = 'block';
            document.getElementById('wordEditModal').style.display = 'flex';
        };

        window.quickDelete = function(id) {
            if(confirm("確定刪除此單字？")) {
                window.vocabulary = window.vocabulary.filter(v => v.id !== id);
                window.saveUserData();
                window.openManageModal();
            }
        };

        window.deleteCurrentUnit = function() {
            if (confirm(`確定要刪除整個「${window.currentUnit}」及其單字？`)) {
                window.vocabulary = window.vocabulary.filter(v => v.unit !== window.currentUnit);
                window.currentUnit = "all";
                window.saveUserData();
                window.closeManageModal();
            }
        };

        window.addPosField = function(trans = "", pos = "n.", ex = "", exTrans = "") {
            const container = document.getElementById('pos-container');
            const div = document.createElement('div');
            div.className = 'pos-entry';
            div.innerHTML = `<button class="remove-pos-btn" onclick="this.parentElement.remove()">✕</button><select class="edit-pos-select"><option value="n." ${pos==='n.'?'selected':''}>n.</option><option value="v." ${pos==='v.'?'selected':''}>v.</option><option value="adj." ${pos==='adj.'?'selected':''}>adj.</option><option value="adv." ${pos==='adv.'?'selected':''}>adv.</option><option value="phr." ${pos==='phr.'?'selected':''}>phr.</option></select><input type="text" class="edit-trans-input" placeholder="翻譯" value="${trans}"><textarea class="edit-ex-input" placeholder="例句" rows="2">${ex}</textarea><textarea class="edit-ex-trans-input" placeholder="例句翻譯" rows="1">${exTrans}</textarea>`;
            container.appendChild(div);
        };

        window.openAddModal = function() { editingId = null; document.getElementById('delete-btn').style.display = 'none'; document.getElementById('pos-container').innerHTML = ""; document.getElementById('edit-word-unit').value = (window.currentUnit==="all"?"":window.currentUnit); document.getElementById('edit-word-eng').value = ""; document.getElementById('edit-word-note').value = ""; window.addPosField(); document.getElementById('wordEditModal').style.display = 'flex'; };
        window.saveWordChange = function() { 
            const word = document.getElementById('edit-word-eng').value.trim();
            if (!word) return alert("請輸入單字");
            const posGroups = [];
            document.querySelectorAll('.pos-entry').forEach(ent => {
                const t = ent.querySelector('.edit-trans-input').value.trim();
                if (t) posGroups.push({ pos: ent.querySelector('.edit-pos-select').value, trans: t, ex: ent.querySelector('.edit-ex-input').value.trim(), exTrans: ent.querySelector('.edit-ex-trans-input').value.trim() });
            });
            const data = { unit: document.getElementById('edit-word-unit').value || "未分類", word, posGroups, note: document.getElementById('edit-word-note').value.trim(), visible: true };
            if (editingId) {
                const idx = window.vocabulary.findIndex(v => v.id === editingId);
                window.vocabulary[idx] = { ...window.vocabulary[idx], ...data };
            } else {
                window.vocabulary.push({ id: Date.now(), ...data, starred: false, myLists: [] });
            }
            window.saveUserData(); window.closeEditModal(); 
        };
        window.closeEditModal = function() { document.getElementById('wordEditModal').style.display = 'none'; };
        window.closeManageModal = function() { document.getElementById('manageModal').style.display = 'none'; };
        window.changeWord = function(n) { const list = getFilteredList().filter(v => v.visible); if(list.length===0) return; window.currentIndex = (window.currentIndex + n + list.length) % list.length; window.isFlipped = false; window.updateUI(); };
        window.flipCard = function() { if(getFilteredList().filter(v => v.visible).length===0) return; window.isFlipped = !window.isFlipped; window.updateUI(); };
        window.toggleStar = function() { 
            const list = getFilteredList().filter(v => v.visible);
            const item = list[window.currentIndex % list.length];
            if (item) { item.starred = !item.starred; window.saveUserData(); window.updateUI(); }
        };
        window.setUnitMode = function(u) { window.currentUnit = u; window.currentIndex = 0; window.updateUI(); };
        window.setListMode = function(l) { window.currentCustomList = l; window.currentIndex = 0; window.updateUI(); };
        window.handleCreateAndAdd = function() { const n = document.getElementById('new-list-name').value.trim(); if (n) { if (!window.customLists.includes(n)) window.customLists.push(n); window.saveUserData(); document.getElementById('new-list-name').value = ""; window.openManageModal(); } };
        function getFilteredList() {
            let list = window.vocabulary;
            if (window.currentUnit !== "all") list = list.filter(v => v.unit === window.currentUnit);
            if (window.currentCustomList !== "none") list = list.filter(v => v.myLists && v.myLists.includes(window.currentCustomList));
            return list;
        }
        function updateUnitSelector() {
            const s = document.getElementById('unit-nav-selector');
            const units = [...new Set(window.vocabulary.map(v => v.unit))];
            s.innerHTML = '<option value="all">📚 所有單元</option>';
            units.forEach(u => s.innerHTML += `<option value="${u}">📖 ${u}</option>`);
            s.value = window.currentUnit;
            const dl = document.getElementById('units-datalist'); dl.innerHTML = "";
            units.forEach(u => dl.innerHTML += `<option value="${u}">`);
        }
        function renderFolderBar() {
            const bar = document.getElementById('custom-folder-bar');
            bar.innerHTML = `<button class="chip ${window.currentCustomList==='none'?'active':''}" onclick="window.setUnitMode('all'); window.setListMode('none')">全部</button>`;
            window.customLists.forEach(l => { bar.innerHTML += `<button class="chip ${window.currentCustomList===l?'active':''}" onclick="window.setListMode('${l}')">${l}</button>`; });
        }
        window.startQuiz = function() {
            quizQueue = getFilteredList().filter(v => v.visible);
            if (quizQueue.length < 2) return alert("可見單字量不足");
            quizQueue.sort(() => Math.random() - 0.5);
            quizIdx = 0; wrongWords = [];
            document.getElementById('study-interface').classList.add('hidden');
            document.getElementById('quiz-interface').classList.remove('hidden');
            loadQuestion();
        };
        function loadQuestion() {
            const item = quizQueue[quizIdx];
            document.getElementById('quiz-progress').innerText = `${quizIdx+1}/${quizQueue.length}`;
            const area = document.getElementById('quiz-options-area'); area.innerHTML = "";
            const isEng = Math.random() > 0.5;
            const mainPos = item.posGroups[0];
            document.getElementById('quiz-question-text').innerText = isEng ? item.word : `(${mainPos.pos}) ${mainPos.trans}`;
            const correctText = isEng ? `(${mainPos.pos}) ${mainPos.trans}` : item.word;
            let opts = [correctText];
            let pool = window.vocabulary.filter(v => v.id !== item.id);
            pool.sort(() => Math.random() - 0.5);
            opts.push(...pool.slice(0, 3).map(v => isEng ? `(${v.posGroups[0].pos}) ${v.posGroups[0].trans}` : v.word));
            opts.sort(() => Math.random() - 0.5);
            opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = o;
                b.onclick = () => {
                    if(o === correctText) b.style.background = "var(--success)";
                    else { b.style.background = "var(--danger)"; wrongWords.push(item); document.querySelectorAll('.opt-btn').forEach(x => { if(x.innerText === correctText) x.style.background = "var(--success)"; }); }
                    setTimeout(() => { quizIdx++; if(quizIdx < quizQueue.length) loadQuestion(); else showResults(); }, 1200);
                }; area.appendChild(b);
            });
        }
        function showResults() {
            document.getElementById('quiz-interface').classList.add('hidden');
            document.getElementById('result-interface').classList.remove('hidden');
            document.getElementById('score-text').innerText = `答對：${quizQueue.length - wrongWords.length} 題`;
            const area = document.getElementById('wrong-words-list'); area.innerHTML = "";
            wrongWords.forEach(w => {
                const div = document.createElement('div'); div.className = 'list-item-row';
                div.innerHTML = `<span><strong>${w.word}</strong> - ${w.posGroups[0].trans}</span>`;
                area.appendChild(div);
            });
        }
        window.exitQuiz = function() { document.getElementById('result-interface').classList.add('hidden'); document.getElementById('study-interface').classList.remove('hidden'); window.updateUI(); };
    </script>
</body>
</html>
