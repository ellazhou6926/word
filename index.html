<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WordMaster</title>
    <style>
        :root { --primary: #4a90e2; --success: #34c759; --danger: #ff3b30; --bg: #f8f9fa; --card-bg: #ffffff; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; color: #333; margin: 0; box-sizing: border-box; }
        .hidden { display: none !important; }
        #login-interface, #study-interface, #quiz-interface, #result-interface { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        /* 單字卡 */
        .card { width: 100%; min-height: 380px; background: var(--card-bg); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 25px; position: relative; box-sizing: border-box; cursor: pointer; }
        .card-more-btn { position: absolute; top: 20px; right: 20px; font-size: 24px; color: #ccc; padding: 5px; cursor: pointer; z-index: 10; }
        
        input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; margin-bottom: 12px; font-size: 1.1rem; font-family: inherit; }
        .primary-btn { padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-circle { width: 60px; height: 60px; border-radius: 50%; border: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        
        .nav-control-btn { height: 46px; padding: 0 12px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; }
        .btn-voice.active-us { background: #e3f2fd; color: #1e88e5; border-color: #1e88e5; }
        .btn-voice.active-uk { background: #fce4ec; color: #d81b60; border-color: #d81b60; }
        
        /* 背面樣式保護 */
        .pos-group-display { text-align: left; width: 100%; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .pos-header { font-size: 1.3rem; margin-bottom: 8px; font-weight: bold; }
        .pos-tag { color: var(--primary); margin-right: 8px; }
        .ex-container { background: #f3f4f6; padding: 12px; border-radius: 10px; margin-top: 5px; position: relative; }
        .ex-text, .ex-trans { font-size: 1.1rem; line-height: 1.5; color: #333; padding-right: 60px; }
        .ex-voice-btns { position: absolute; top: 10px; right: 8px; display: flex; flex-direction: column; gap: 4px; }
        .ex-voice-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ddd; background: white; font-size: 10px; font-weight: bold; color: #666; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #note-display { color: #777; font-size: 1.05rem; border-top: 1px dashed #ccc; padding-top: 10px; font-style: italic; width: 100%; text-align: left; }
        
        /* 彈窗：強制顯示邏輯 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 5000; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 90%; max-width: 400px; box-sizing: border-box; max-height: 85vh; overflow-y: auto; text-align: left; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        
        .pos-entry { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--primary); position: relative; }
        .remove-pos-btn { position: absolute; top: 5px; right: 5px; color: var(--danger); background: none; border: none; cursor: pointer; font-weight: bold; }
        
        .chip-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; width: 100%; }
        .chip { padding: 8px 16px; border-radius: 20px; background: #e0e0e0; cursor: pointer; font-size: 0.9rem; border: none; transition: all 0.2s; display: flex; align-items: center; gap: 5px; }
        .chip.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="login-interface">
        <h2 style="color: var(--primary);">WordMaster</h2>
        <input type="text" id="user-name-input" placeholder="輸入名字開始同步">
        <button class="primary-btn" onclick="window.login()">登入並同步</button>
    </div>

    <div id="study-interface" class="hidden">
        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 10px;">
            <span id="user-display" style="font-weight: bold; color: var(--primary);"></span>
            <button onclick="location.reload()" style="background:none; border:none; color:#999; text-decoration:underline;">登出</button>
        </div>
        <div style="display:flex; gap:6px; width:100%; margin-bottom:15px; align-items: center;">
            <select id="unit-nav-selector" onchange="window.setUnitMode(this.value)" style="margin-bottom:0; flex-grow: 1; height: 46px;"></select>
            <button id="voice-toggle-btn" class="nav-control-btn btn-voice" onclick="window.cycleVoiceMode()">🔇</button>
            <button class="nav-control-btn" onclick="window.openManageModal()">☰</button>
            <button class="nav-control-btn" style="background:var(--success); color:white; border:none;" onclick="window.openAddModal()">+</button>
        </div>
        <div class="card" onclick="window.flipCard()">
            <div class="card-more-btn" onclick="window.openEditFromCard(event)">⋯</div>
            <h1 id="word-display" style="font-size: 3.2rem; margin-bottom: 10px;">載入中...</h1>
            <div id="accent-box" style="display:flex; gap:10px; margin-top:15px;">
                <div style="padding:5px 15px; border-radius:20px; border:1px solid #eee; background:#fdfdfd; font-size:0.8rem; font-weight:bold; color:#888; cursor:pointer;" onclick="window.speakText(null, event, 'en-US')">🔊 US</div>
                <div style="padding:5px 15px; border-radius:20px; border:1px solid #eee; background:#fdfdfd; font-size:0.8rem; font-weight:bold; color:#888; cursor:pointer;" onclick="window.speakText(null, event, 'en-GB')">🔊 UK</div>
            </div>
            <div id="detail-display" style="display: none; width: 100%;">
                <div id="pos-groups-area"></div>
                <div id="note-display"></div>
            </div>
        </div>
        <div style="display: flex; gap: 20px; margin-top: 20px;">
            <button class="btn-circle" onclick="window.changeWord(-1)">←</button>
            <button id="star-btn" class="btn-circle" onclick="window.toggleStar()">☆</button>
            <button class="btn-circle" onclick="window.changeWord(1)">→</button>
        </div>
        <button class="primary-btn" onclick="window.startQuiz()">開始測驗</button>
        <div id="main-chip-bar" class="chip-container"></div>
    </div>

    <div id="wordEditModal" class="modal">
        <div id="modal-scroll-layer" class="modal-content">
            <h3 id="modal-title" style="margin-top:0">單字編輯</h3>
            <input type="text" id="edit-word-unit" placeholder="單元名稱 (L1, Unit1...)">
            <input type="text" id="edit-word-eng" placeholder="英文單字">
            <div id="pos-container"></div>
            <button class="primary-btn" style="background:#eee; color:#333; margin-bottom:15px;" onclick="window.addPosField()">+ 新增翻譯與例句</button>
            <textarea id="edit-word-note" placeholder="備註內容" rows="2"></textarea>
            <button class="primary-btn" style="background:var(--success)" onclick="window.saveWordChange()">儲存雲端</button>
            <button id="delete-btn" class="primary-btn" style="background:var(--danger); display:none;" onclick="window.deleteWord()">刪除單字</button>
            <button class="primary-btn" style="background:#888; margin-top:10px;" onclick="window.closeEditModal()">取消</button>
        </div>
    </div>

    <div id="manageModal" class="modal"><div class="modal-content"><div style="display:flex; justify-content:space-between;"><h3>清單管理</h3><button onclick="window.closeManageModal()" style="border:none; background:none; font-size:1.5rem;">✕</button></div><button id="unit-delete-btn" class="primary-btn" style="background:var(--danger); margin-bottom:20px; display:none;" onclick="window.deleteCurrentUnit()">🗑️ 刪除單元</button><div id="manage-list-container"></div><div style="border-top:1px solid #eee; padding-top:15px; margin-top:15px;"><div id="existing-lists-area"></div><div style="display:flex; gap:5px; margin-top:10px;"><input type="text" id="new-list-name" placeholder="標籤名稱"><button class="primary-btn" style="width:auto; margin-top:0;" onclick="window.handleCreateAndAdd()">建立</button></div></div><button class="primary-btn" style="background:#888; margin-top:20px;" onclick="window.closeManageModal()">關閉</button></div></div>
    <div id="quiz-interface" class="hidden"><div id="quiz-progress" style="margin-bottom: 15px; font-weight: bold; color: var(--primary);"></div><div class="card" style="cursor: default;"><h2 style="margin-top:0">聽音拼字</h2><button class="primary-btn" style="background:#f39c12; width:auto; margin-bottom: 20px;" onclick="window.speakQuizWord()">🔊 重聽</button><input type="text" id="quiz-spelling-input" placeholder="拼拼看" style="text-align:center;" onkeydown="if(event.key==='Enter') window.submitQuizSpelling()"><button class="primary-btn" onclick="window.submitQuizSpelling()">送出</button></div><button class="primary-btn" style="background:#888; margin-top:20px;" onclick="window.exitQuiz()">結束</button></div>
    <div id="quiz-feedback-overlay"><div class="feedback-box"><div id="feedback-icon" style="font-size: 3rem; margin-bottom: 15px;"></div><div id="feedback-text" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;"></div><button id="feedback-btn" class="primary-btn" onclick="window.handleQuizFeedbackClose()">繼續</button></div></div>
    <div id="result-interface" class="hidden"><h2>結束</h2><p id="score-text" style="font-size: 1.5rem; font-weight:bold;"></p><div id="wrong-words-list" style="width:100%;"></div><button class="primary-btn" onclick="window.exitQuiz()">返回學習模式</button></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCa-uQsB27p4adt7_c074zitJTJUm9R57c", authDomain: "word-32e5c.firebaseapp.com", databaseURL: "https://word-32e5c-default-rtdb.firebaseio.com", projectId: "word-32e5c", storageBucket: "word-32e5c.firebasestorage.app", messagingSenderId: "1065772631955", appId: "1:1065772631955:web:5c8e44b1d95560e3224a66" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.currentUser = ""; window.vocabulary = []; window.customLists = []; window.currentUnit = "all"; window.currentCustomList = "none"; window.currentIndex = 0; window.isFlipped = false; window.voiceMode = "off";
        let editingId = null; let quizQueue = []; let quizIdx = 0; let wrongWords = []; let lastQuizAnswerCorrect = true;

        window.login = function() {
            const name = document.getElementById('user-name-input').value.trim();
            if (!name) return alert("請輸入名字");
            window.currentUser = name;
            document.getElementById('login-interface').classList.add('hidden');
            document.getElementById('study-interface').classList.remove('hidden');
            document.getElementById('user-display').innerText = "👤 " + name;
            onValue(ref(db, 'users/' + window.currentUser), (snap) => {
                const data = snap.val();
                if (data) {
                    window.vocabulary = (data.vocabulary || []).map(v => {
                        if (!v.posGroups) v.posGroups = [{ pos: v.pos || 'n.', trans: v.trans || '無翻譯', ex: '', exTrans: '' }];
                        if (v.visible === undefined) v.visible = true;
                        if (!v.myLists) v.myLists = [];
                        if (v.starred === undefined) v.starred = false;
                        return v;
                    });
                    window.customLists = data.customLists || [];
                }
                updateUnitSelector(); window.updateUI();
            });
        };

        // --- 彈窗顯示修正：確保置頂與欄位初始化 ---
        window.openAddModal = function() {
            editingId = null;
            document.getElementById('modal-title').innerText = "新增單字";
            document.getElementById('edit-word-unit').value = (window.currentUnit === "all" ? "" : window.currentUnit);
            document.getElementById('edit-word-eng').value = "";
            document.getElementById('edit-word-note').value = ""; // 清空備註
            document.getElementById('pos-container').innerHTML = "";
            window.addPosField(); 
            document.getElementById('delete-btn').style.display = 'none';
            
            const modal = document.getElementById('wordEditModal');
            modal.style.display = 'flex';
            document.getElementById('modal-scroll-layer').scrollTop = 0; 
        };

        window.quickEdit = function(id) {
            const item = window.vocabulary.find(v => v.id === id);
            if(!item) return;
            editingId = id;
            document.getElementById('modal-title').innerText = "編輯單字";
            document.getElementById('edit-word-unit').value = item.unit;
            document.getElementById('edit-word-eng').value = item.word;
            document.getElementById('edit-word-note').value = item.note || ""; // 載入備註
            document.getElementById('pos-container').innerHTML = "";
            item.posGroups.forEach(g => window.addPosField(g.trans, g.pos, g.ex, g.exTrans));
            document.getElementById('manageModal').style.display = 'none';
            document.getElementById('delete-btn').style.display = 'block';
            
            const modal = document.getElementById('wordEditModal');
            modal.style.display = 'flex';
            document.getElementById('modal-scroll-layer').scrollTop = 0;
        };

        window.saveWordChange = function() {
            const word = document.getElementById('edit-word-eng').value.trim();
            const unit = document.getElementById('edit-word-unit').value.trim() || "未分類";
            const note = document.getElementById('edit-word-note').value.trim(); // 獲取備註內容
            if (!word) return alert("請輸入英文單字");
            
            const grps = [];
            document.querySelectorAll('.pos-entry').forEach(d => {
                const tr = d.querySelector('.tr').value.trim();
                if (tr) {
                    grps.push({
                        pos: d.querySelector('.ps').value,
                        trans: tr,
                        ex: d.querySelector('.ex').value.trim(),
                        exTrans: d.querySelector('.extr').value.trim()
                    });
                }
            });
            if (grps.length === 0) return alert("請填寫翻譯");

            if(editingId) {
                const idx = window.vocabulary.findIndex(v => v.id === editingId);
                window.vocabulary[idx] = { ...window.vocabulary[idx], word, posGroups: grps, unit, note };
            } else {
                window.vocabulary.push({ id: Date.now(), word, posGroups: grps, unit, note, visible: true, myLists: [], starred: false });
            }
            window.saveUserData();
            window.closeEditModal();
            window.updateUI();
        };

        window.closeEditModal = function() { document.getElementById('wordEditModal').style.display = 'none'; };

        // --- 其餘核心發音、測驗、UI邏輯 ---
        window.saveUserData = function() { if (!window.currentUser) return; set(ref(db, 'users/' + window.currentUser), { vocabulary: window.vocabulary, customLists: window.customLists }); };
        function updateVoiceIcon() { const btn = document.getElementById('voice-toggle-btn'); btn.classList.remove('active-us', 'active-uk'); if (window.voiceMode === "us") { btn.innerText = "🔊 US"; btn.classList.add('active-us'); } else if (window.voiceMode === "uk") { btn.innerText = "🔊 UK"; btn.classList.add('active-uk'); } else { btn.innerText = "🔇"; } }
        window.cycleVoiceMode = function() { if (window.voiceMode === "off") window.voiceMode = "us"; else if (window.voiceMode === "us") window.voiceMode = "uk"; else window.voiceMode = "off"; updateVoiceIcon(); if (window.voiceMode !== "off") window.speakCurrent(); };
        window.speakText = function(text, e, langCode) { if(e) e.stopPropagation(); const list = getVisibleList(); if (list.length === 0 && !text) return; const targetText = text || list[window.currentIndex % list.length].word; const ut = new SpeechSynthesisUtterance(targetText); ut.lang = langCode || (window.voiceMode === "uk" ? "en-GB" : "en-US"); ut.rate = 0.95; window.speechSynthesis.cancel(); window.speechSynthesis.speak(ut); };
        window.speakCurrent = function() { const list = getVisibleList(); if (list.length === 0) return; const item = list[window.currentIndex % list.length]; const lang = (window.voiceMode === "uk") ? "en-GB" : "en-US"; if (!window.isFlipped) window.speakText(item.word, null, lang); else { let firstEx = item.posGroups.find(g => g.ex)?.ex || ""; window.speakText(item.word + ". " + firstEx, null, lang); } };
        window.flipCard = function() { if(getVisibleList().length===0) return; window.isFlipped = !window.isFlipped; window.updateUI(); };
        window.changeWord = function(n) { const list = getVisibleList(); if(list.length===0) return; window.currentIndex = (window.currentIndex + n + list.length) % list.length; window.isFlipped = false; window.updateUI(); };
        window.setUnitMode = function(u) { window.currentUnit = u; window.currentIndex = 0; window.updateUI(); };
        window.setListMode = function(name) { window.currentCustomList = name; window.currentIndex = 0; window.updateUI(); };
        function renderMainChips() { const bar = document.getElementById('main-chip-bar'); bar.innerHTML = `<button class="chip ${window.currentCustomList==='none'?'active':''}" onclick="window.setListMode('none')">全部</button><button class="chip ${window.currentCustomList==='starred_only'?'active':''}" onclick="window.setListMode('starred_only')">⭐ 星號</button>`; window.customLists.forEach(name => { const chip = document.createElement('button'); chip.className = `chip ${window.currentCustomList === name ? 'active' : ''}`; chip.innerText = name; chip.onclick = () => window.setListMode(name); bar.appendChild(chip); }); }
        window.toggleStar = function() { const list = getVisibleList(); if (list.length === 0) return; const item = list[window.currentIndex % list.length]; item.starred = !item.starred; window.saveUserData(); window.updateUI(); };
        window.updateUI = function() {
            const list = getVisibleList(); const wd = document.getElementById('word-display'); const dd = document.getElementById('detail-display'); const area = document.getElementById('pos-groups-area'); const starBtn = document.getElementById('star-btn'); updateVoiceIcon();
            if (list.length === 0) { wd.innerText = "無符合單字"; wd.style.display = 'block'; dd.style.display = 'none'; starBtn.innerText = "☆"; starBtn.style.color = "#ccc"; } 
            else { const item = list[window.currentIndex % list.length]; wd.innerText = item.word; starBtn.innerText = item.starred ? "★" : "☆"; starBtn.style.color = item.starred ? "#ffd700" : "#333"; if (window.voiceMode !== "off") window.speakCurrent(); area.innerHTML = ""; item.posGroups.forEach(g => { let exHtml = g.ex ? `<div class="ex-container"><div class="ex-text">${g.ex}</div>${g.exTrans ? `<div class="ex-trans">${g.exTrans}</div>` : ""}<div class="ex-voice-btns"><button class="ex-voice-btn" onclick="window.speakText('${g.ex.replace(/'/g, "\\'")}', event, 'en-US')">U</button><button class="ex-voice-btn" onclick="window.speakText('${g.ex.replace(/'/g, "\\'")}', event, 'en-GB')">K</button></div></div>` : ""; area.innerHTML += `<div class="pos-group-display"><div class="pos-header"><span class="pos-tag">(${g.pos})</span>${g.trans}</div>${exHtml}</div>`; }); document.getElementById('note-display').innerText = item.note || ""; dd.style.display = window.isFlipped ? 'block' : 'none'; wd.style.display = window.isFlipped ? 'none' : 'block'; }
            renderMainChips();
        };
        window.openManageModal = function() { const container = document.getElementById('manage-list-container'); container.innerHTML = ""; window.vocabulary.filter(v => window.currentUnit === 'all' || v.unit === window.currentUnit).forEach(item => { container.innerHTML += `<div class="manage-item"><input type="checkbox" ${item.visible ? 'checked' : ''} onchange="window.toggleVisibility(${item.id})"><div style="flex-grow:1;"><b>${item.word}</b></div><button onclick="window.quickEdit(${item.id})" style="border:none; background:none; cursor:pointer;">✏️</button></div>`; }); renderCustomListsArea(); document.getElementById('manageModal').style.display = 'flex'; };
        function renderCustomListsArea() { const area = document.getElementById('existing-lists-area'); area.innerHTML = ""; window.customLists.forEach(name => { const chip = document.createElement('button'); chip.className = 'chip'; chip.innerHTML = `${name} <span class="chip-del" onclick="window.deleteCustomList('${name}', event)">✕</span>`; chip.onclick = () => window.toggleWordInList(name); area.appendChild(chip); }); }
        window.toggleWordInList = function(listName) { const list = getVisibleList(); if (list.length === 0) return; const item = list[window.currentIndex % list.length]; if (!item.myLists) item.myLists = []; const idx = item.myLists.indexOf(listName); if (idx === -1) item.myLists.push(listName); else item.myLists.splice(idx, 1); window.saveUserData(); renderCustomListsArea(); };
        window.handleCreateAndAdd = function() { const name = document.getElementById('new-list-name').value.trim(); if (name && !window.customLists.includes(name)) { window.customLists.push(name); window.saveUserData(); renderCustomListsArea(); renderMainChips(); } document.getElementById('new-list-name').value = ""; };
        window.deleteCustomList = function(name, e) { e.stopPropagation(); if(confirm(`刪除標籤？`)) { window.customLists = window.customLists.filter(l => l !== name); window.vocabulary.forEach(v => { if(v.myLists) v.myLists = v.myLists.filter(l => l !== name); }); window.saveUserData(); renderCustomListsArea(); renderMainChips(); } };
        window.closeManageModal = function() { document.getElementById('manageModal').style.display = 'none'; };
        window.toggleVisibility = function(id) { const item = window.vocabulary.find(v => v.id === id); if (item) { item.visible = !item.visible; window.saveUserData(); window.updateUI(); } };
        window.deleteWord = function() { if(confirm("刪除單字？")) { window.vocabulary = window.vocabulary.filter(v=>v.id!==editingId); window.saveUserData(); window.closeEditModal(); window.updateUI(); } };
        window.deleteCurrentUnit = function() { if (confirm(`刪除單元？`)) { window.vocabulary = window.vocabulary.filter(v => v.unit !== window.currentUnit); window.currentUnit = "all"; window.saveUserData(); window.closeManageModal(); window.updateUI(); } };
        window.openEditFromCard = function(e) { e.stopPropagation(); const list = getVisibleList(); if(list.length > 0) window.quickEdit(list[window.currentIndex % list.length].id); };
        function getVisibleList() { let list = window.vocabulary; if (window.currentUnit !== "all") list = list.filter(v => v.unit === window.currentUnit); if (window.currentCustomList === "starred_only") list = list.filter(v => v.starred); else if (window.currentCustomList !== "none") list = list.filter(v => v.myLists && v.myLists.includes(window.currentCustomList)); return list.filter(v => v.visible); }
        function getFilteredList() { let list = window.vocabulary; if (window.currentUnit !== "all") list = list.filter(v => v.unit === window.currentUnit); if (window.currentCustomList === "starred_only") list = list.filter(v => v.starred); else if (window.currentCustomList !== "none") list = list.filter(v => v.myLists && v.myLists.includes(window.currentCustomList)); return list; }
        function updateUnitSelector() { const s = document.getElementById('unit-nav-selector'); const units = [...new Set(window.vocabulary.map(v => v.unit))]; s.innerHTML = '<option value="all">📚 所有單元</option>'; units.forEach(u => s.innerHTML += `<option value="${u}">📖 ${u}</option>`); s.value = window.currentUnit; }
        window.startQuiz = function() { const visibleList = getVisibleList(); if (visibleList.length < 1) return alert("單字不足"); quizQueue = [...visibleList].sort(() => Math.random() - 0.5); quizIdx = 0; wrongWords = []; document.getElementById('study-interface').classList.add('hidden'); document.getElementById('quiz-interface').classList.remove('hidden'); loadQuizQuestion(); };
        function loadQuizQuestion() { const item = quizQueue[quizIdx]; lastQuizAnswerCorrect = true; document.getElementById('quiz-progress').innerText = `題目：${quizIdx + 1} / ${quizQueue.length}`; const input = document.getElementById('quiz-spelling-input'); input.value = ""; input.focus(); window.speakQuizWord(); }
        window.speakQuizWord = function() { window.speakText(quizQueue[quizIdx].word, null, 'en-US'); };
        window.submitQuizSpelling = function() { const item = quizQueue[quizIdx]; const input = document.getElementById('quiz-spelling-input').value.trim().toLowerCase(); if (input === item.word.toLowerCase()) window.showQuizFeedback(true, "🌟 拼對了！"); else { if (lastQuizAnswerCorrect) { wrongWords.push(item); lastQuizAnswerCorrect = false; } window.showQuizFeedback(false, `❌ 錯誤！<br>正確答案是：<br><span style="color:var(--primary)">${item.word}</span>`); } };
        window.showQuizFeedback = function(isCorrect, msg) { const overlay = document.getElementById('quiz-feedback-overlay'); const icon = document.getElementById('feedback-icon'); const text = document.getElementById('feedback-text'); const btn = document.getElementById('feedback-btn'); overlay.style.display = 'flex'; text.innerHTML = msg; if (isCorrect) { icon.innerText = "🌟"; btn.style.display = 'none'; setTimeout(window.handleQuizFeedbackClose, 1000); } else { icon.innerText = "✍️"; btn.style.display = 'block'; btn.innerText = "再試一次"; } };
        window.handleQuizFeedbackClose = function() { document.getElementById('quiz-feedback-overlay').style.display = 'none'; if (document.getElementById('feedback-icon').innerText === "🌟") { quizIdx++; if (quizIdx < quizQueue.length) loadQuizQuestion(); else showQuizResult(); } else { const input = document.getElementById('quiz-spelling-input'); input.value = ""; input.focus(); } };
        function showQuizResult() { document.getElementById('quiz-interface').classList.add('hidden'); document.getElementById('result-interface').classList.remove('hidden'); const score = quizQueue.length - [...new Set(wrongWords)].length; document.getElementById('score-text').innerText = `掌握度：${score} / ${quizQueue.length}`; const area = document.getElementById('wrong-words-list'); area.innerHTML = "<h4>需要加強過的單字：</h4>"; [...new Set(wrongWords)].forEach(w => { area.innerHTML += `<div class="manage-item"><b>${w.word}</b> - ${w.posGroups[0].trans}</div>`; }); }
        window.exitQuiz = function() { document.getElementById('quiz-interface').classList.add('hidden'); document.getElementById('result-interface').classList.add('hidden'); document.getElementById('study-interface').classList.remove('hidden'); window.updateUI(); };
        window.addPosField = function(trans = "", pos = "n.", ex = "", exTrans = "") { const div = document.createElement('div'); div.className = 'pos-entry'; div.innerHTML = `<button class="remove-pos-btn" onclick="this.parentElement.remove()">✕</button><select class="ps"><option value="n." ${pos==='n.'?'selected':''}>n.</option><option value="v." ${pos==='v.'?'selected':''}>v.</option><option value="adj." ${pos==='adj.'?'selected':''}>adj.</option><option value="adv." ${pos==='adv.'?'selected':''}>adv.</option><option value="phr." ${pos==='phr.'?'selected':''}>phr.</option></select><input type="text" class="tr" placeholder="翻譯" value="${trans}"><textarea class="ex" placeholder="例句">${ex}</textarea><textarea class="extr" placeholder="例句翻譯">${exTrans}</textarea>`; document.getElementById('pos-container').appendChild(div); };
    </script>
</body>
</html>
